# Jira Integration Configuration
# Copy this to jira-config.yml and customize for your project

# MCP Server Configuration
mcp_server: "atlassian"

# Jira Project Configuration
project:
  key: ""  # Your Jira project key (e.g., "PROJ", "DEVTEST")

# Artifact Mapping Configuration
# Defines how spec-kit artifacts map to Jira issue types
mapping:
  # Spec artifact mapping (highest level - from SPEC.md)
  # Options: Any Jira issue type name (e.g., "Epic", "Initiative")
  spec_artifact: "Epic"

  # Phase artifact mapping (middle level - Phase headers in TASKS.md)
  # Options: Any Jira issue type name (e.g., "Story", "Task", "Feature")
  phase_artifact: "Story"

  # Task artifact mapping (lowest level - task items under each Phase)
  # Options: Any Jira issue type name (e.g., "Task", "Sub-task")
  # Set to "" or "none" for 2-level mode (Spec → Phases only)
  # In 2-level mode, tasks are embedded as checklists in Phase descriptions
  task_artifact: "Task"

  # Relationships between issues
  # Options for each: "Parent", "Epic Link", "Relates", "Blocks", "Implements", "is child of", "none"
  relationships:
    # How Phase connects to Spec (default: "Epic Link" for Company-managed)
    spec_phase: "Epic Link"

    # How Task connects to Phase (default: "Relates" for Company-managed)
    phase_task: "Relates"

    # Direct Task-to-Spec link (default: "Epic Link" for Company-managed)
    spec_task: "Epic Link"

# Default Values for Issue Creation
defaults:
  spec:
    labels: []
    custom_fields: {}
  phase:
    labels: []
    custom_fields: {}
  task:
    labels: []
    custom_fields: {}

# Field Mappings (discovered via /speckit.jira.discover-fields)
field_mappings: {}

# Status Mapping for sync-status command
status_mapping:
  completed: "Done"       # [x] in TASKS.md
  pending: "To Do"        # [ ] in TASKS.md
  in_progress: "In Progress"  # [~] in TASKS.md (optional)

# Environment Variable Overrides:
# - SPECKIT_JIRA_MCP_SERVER
# - SPECKIT_JIRA_PROJECT_KEY
# - SPECKIT_JIRA_SPEC_ARTIFACT
# - SPECKIT_JIRA_PHASE_ARTIFACT
# - SPECKIT_JIRA_TASK_ARTIFACT
# - SPECKIT_JIRA_SPEC_PHASE_RELATIONSHIP
# - SPECKIT_JIRA_PHASE_TASK_RELATIONSHIP
# - SPECKIT_JIRA_SPEC_TASK_RELATIONSHIP
