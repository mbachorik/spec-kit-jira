# Example Jira Configuration for a TypeScript Microservices Project

# Jira Project
project:
  key: "DEMO" # Replace with your project key

# Artifact Mapping
mapping:
  # Maps spec-kit artifacts to Jira issue types
  spec_artifact: "Epic"
  phase_artifact: "Story"
  task_artifact: "Sub-task"  # Use Sub-task for grouped tasks under stories

  # Relationships
  relationships:
    spec_phase: "Epic Link"
    phase_task: "Parent"  # Sub-tasks use Parent relationship
    spec_task: "Epic Link"

# Default Values for Issues
defaults:
  # Spec (Epic) defaults
  spec:
    labels: ["spec-driven", "microservice", "typescript"]
    custom_fields: {}
      # Sprint assignment (example - use discover-fields to find actual ID)
      # customfield_10001: "Sprint 42"

      # Team assignment
      # customfield_10004: "Platform Engineering"

  # Phase (Story) defaults
  phase:
    labels: []
    custom_fields: {}

  # Task/Subtask defaults
  task:
    labels: ["implementation", "automated"]
    custom_fields: {}
      # Story points (default to 2 per task)
      # customfield_10002: 2

      # Component
      # customfield_10003: "Backend"

# Field Mappings
# Use these to map spec-kit concepts to Jira custom fields
field_mappings: {}
  # Map spec version to custom field
  # spec_version: "customfield_10005"

  # Map implementation phase
  # phase: "customfield_10006"

# Status Mapping
status_mapping:
  completed: "Done"       # [x] in TASKS.md
  pending: "To Do"        # [ ] in TASKS.md
  in_progress: "In Progress"  # [~] in TASKS.md

# Notes:
# - Run /speckit.jira.discover-fields to find custom field IDs
# - Uncomment and customize custom_fields as needed
# - Create jira-config.local.yml for local testing overrides
